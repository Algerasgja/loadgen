dag_dir: "dags"

workload:
  target_rps: 5.0
  total_runs: 10
  max_concurrency: 2
  stddev_ratio: 0.1

openwhisk:
  wsk_path: "/usr/local/bin/wsk"
  poll_interval_ms: 50
  poll_batch_size: 64
  demo_dir: "nodejs_demo"
  action_kind: "nodejs:14"
  auto_create_actions: 1

cap_warm:
  url: "" # e.g., "http://192.168.1.100:30000"
